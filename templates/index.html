{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<section class="hero" id="home">
    <canvas id="particles-canvas"></canvas>
    <div class="hero-overlay"></div>
    
    <div class="container hero-content scroll-reveal">
        <div class="hero-logo">
            <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="DIMEN6 Logo" class="hero-logo-svg" width="200">
        </div>
        <h1>Dimensões de uma <span class="highlight-text">Imaginação</span> em Realidade</h1>
        <p>Na DIMEN6, damos vida a ideias através de Sites, modelagem 3D e CGI. Criando experiências imersivas para publicidade.</p>
        <a href="{{ url_for('sobre') }}" class="cta-button">EXPLORAR O UNIVERSO</a>
    </div>
</section>
{% endblock %}
